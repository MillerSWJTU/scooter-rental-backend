spring.application.name=ScooterRent

# 允许Bean定义覆盖
spring.main.allow-bean-definition-overriding=true

# Database Configuration
spring.datasource.url=jdbc:sqlite:data/scooter_rent.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.jpa.defer-datasource-initialization=true

# SQLite specific settings
spring.jpa.properties.hibernate.jdbc.batch_size=1
spring.jpa.properties.hibernate.jdbc.fetch_size=1
spring.jpa.properties.hibernate.connection.pool_size=1
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.dialect.storage_engine=innodb
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.generate_statistics=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Server Configuration
server.port=8080

# Swagger UI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.disable-swagger-default-url=false
springdoc.swagger-ui.use-root-path=false
springdoc.swagger-ui.configUrl=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs
springdoc.swagger-ui.layout=BaseLayout

# Admin Registration Configuration
admin.registration.secret=654321

# JWT Configuration
jwt.secret=ScooterRent2024SecretKeyForJWTTokenGenerationAndValidationWithMinimumLengthOf512BitsToMeetHS512AlgorithmRequirements
jwt.expiration=86400000

# Role Configuration
# 允许用户没有角色也能登录
app.allow-null-role=true
app.default-role-name=ROLE_USER

# Logging Configuration
logging.level.org.springframework=INFO
logging.level.scooterrent=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.transaction=TRACE
logging.level.org.hibernate.transaction=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# 日志文件配置
logging.file.name=logs/scooter-rent.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

